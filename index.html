<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Robotic Gripper App</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, #4f46e5, transparent 40%),
                radial-gradient(circle at bottom right, #06b6d4, transparent 40%),
                linear-gradient(135deg, #0f172a, #1e293b);

            display: flex;
            justify-content: center;
            align-items: flex-start;

            overflow-x: hidden;
            overflow-y: auto;

            padding: 20px 10px;
        }

        .download-card {
            max-width: 600px;
            width: 95%;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, .2);
            box-shadow:
                0 25px 50px rgba(0, 0, 0, .4),
                inset 0 1px 1px rgba(255, 255, 255, .15);
            transform-style: preserve-3d;
            transition: all .4s ease;
        }



        .robot-icon {
            font-size: 5rem;
            color: #00e5ff;
            text-shadow: 0 0 25px rgba(0, 229, 255, .8);
        }

        .title {
            font-size: 2.5rem;
            font-weight: 800;
            color: white;
        }

        .subtitle {
            color: #cbd5e1;
            font-size: 1.05rem;
        }

        .feature-box {
            background: rgba(255, 255, 255, .08);
            border-radius: 15px;
            padding: 15px;
            color: white;
            transition: .3s;
        }

        .feature-box:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, .12);
        }

        .download-btn {
            /* background: linear-gradient(135deg, #00e5ff, #4f46e5); */
            background: linear-gradient(135deg, #693ac0, #240858);
            border: 2px solid #fff;
            color: white;
            font-size: 1.2rem;
            font-weight: 700;
            padding: 15px 35px;
            border-radius: 50px;
            box-shadow: 0 15px 35px rgba(79, 70, 229, .45);
            transition: .3s;
        }

        .download-btn:hover {
            transform: translateY(-3px) scale(1.03);
            color: white;
            border: 2px solid #fff;
        }

        .version-badge {
            background: rgba(0, 229, 255, .15);
            color: #00e5ff;
            border: 1px solid rgba(0, 229, 255, .4);
            border-radius: 30px;
            padding: 8px 18px;
            display: inline-block;
            font-weight: 600;
        }

        @media (max-width:768px) {

            body {
                padding: 15px 10px;
            }

            .download-card {
                width: 100%;
                max-width: 100%;
                border-radius: 18px;
                padding: 20px 15px !important;
                margin: 0;
            }

            .robot-icon {
                font-size: 3rem;
                margin-bottom: 10px !important;
            }

            .title {
                font-size: 1.7rem;
                line-height: 1.2;
            }

            .subtitle {
                font-size: .9rem;
                line-height: 1.5;
                margin-bottom: 18px !important;
            }

            .row {
                margin-bottom: 20px !important;
            }

            .feature-box {
                padding: 12px;
            }

            .feature-box h6 {
                font-size: .9rem;
            }

            .download-btn {
                display: block;
                width: 100%;
                padding: 16px;
                font-size: 1rem;
                margin-top: 10px;
            }

            .text-light {
                font-size: .8rem;
                margin-top: 15px !important;
            }
        }
    </style>


</head>

<body>


    <div class="card download-card text-center p-4 p-md-3">

        <div class="robot-icon mb-3">
            <i class="bi bi-robot"></i>
            <!-- <img src="Robotic gripper.png" alt="4 Finger Gripper" height="100"> -->
        </div>

        <h1 class="title">Robotic Gripper App</h1>

        <p class="subtitle mb-4">
            Spring Structural Model of Robotic Gripper
            <br>
            4 Finger & 3 Finger + 1 Thumb Analysis System
        </p>

        <!-- <div class="version-badge mb-4">
            <i class="bi bi-download me-2"></i>
            Latest Version
        </div> -->

        <div class="row g-3 mb-4">

            <div class="col-md-4">
                <div class="feature-box">
                    <i class="bi bi-cpu-fill fs-2"></i>
                    <h6 class="mt-2">Robotic Analysis</h6>
                </div>
            </div>

            <div class="col-md-4">
                <div class="feature-box">
                    <i class="bi bi-graph-up-arrow fs-2"></i>
                    <h6 class="mt-2">Graph Generation</h6>
                </div>
            </div>

            <div class="col-md-4">
                <div class="feature-box">
                    <i class="bi bi-file-earmark-excel-fill fs-2"></i>
                    <h6 class="mt-2">Excel Export</h6>
                </div>
            </div>

        </div>

        <button class="btn download-btn" onclick="downloadExe()">
            <i class="bi bi-download me-2"></i>
            Download Windows App
        </button>

        <p class="text-light mt-4 mb-0">
            Windows 10 / 11 • Standalone EXE • No Installation Required
        </p>

    </div>

    <script>
        function downloadExe() {

            const warningMessage =
                `🚨 IMPORTANT: First Time Launch Warning\n\n` +
                `If Windows shows:\n\n` +
                `"Windows protected your PC"\n` +
                `"Unknown Publisher"\n\n` +
                `➤ Click "More Info"\n` +
                `➤ Click "Run Anyway"\n\n` +
                `The application is safe.\n` +
                `This warning appears because the EXE is not digitally signed.`;

            if (confirm(warningMessage)) {

                // const releaseTag = "latest";


                const exeUrl =
                    `https://github.com/nobara345/robotic-gripper/releases/latest/download/RoboticGripperApp_Setup.exe`;


                console.log("exeUrl>>", exeUrl)
                const link = document.createElement("a");

                link.href = exeUrl;
                link.download = "RoboticGripperApp.exe";

                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }
        }
    </script>


</body>

</html>
